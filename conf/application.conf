include "backend.conf"

# This is the main configuration file for the application.
# ~~~~~

appName = disa-returns

# Default http client
play.modules.enabled += "uk.gov.hmrc.play.bootstrap.HttpClientV2Module"

# Play Modules
play.modules.enabled += "uk.gov.hmrc.disareturns.config.Module"

play.modules.enabled += "uk.gov.hmrc.mongo.play.PlayMongoModule"

play.filters.enabled += "play.filters.cors.CORSFilter"
play.filters.cors {
  allowedOrigins = ["http://localhost:9680"]
}

play.modules.enabled += "uk.gov.hmrc.play.bootstrap.AuthModule"

# Api related config
api {
  1.0 {
          status = "PRIVATE ALPHA"
          endpoints {
              api-released-in-production = false
          }
  }
}

# The application languages
# ~~~~~
play.i18n.langs = ["en"]

# Router
# ~~~~~
# Define the Router object to use for this application.
# This router will be looked up first when the application is starting up,
# so make sure this is the entry point.
# Furthermore, it's assumed your route file is named properly.
# So for an application router like `my.application.Router`,
# you may need to define a router file `conf/my.application.routes`.
# Default to Routes in the root package (and conf/routes)
# !!!WARNING!!! DO NOT CHANGE THIS ROUTER
play.http.router = prod.Routes

# Controller
# ~~~~~
# By default all controllers will have authorisation, logging and
# auditing (transaction monitoring) enabled.
# The below controllers are the default exceptions to this rule.

controllers {

}

# Microservice specific config

mongodb {
  uri = "mongodb://localhost:27017/disa-returns"
  timeToLive = 30
}

returnResultsRecordsPerPage = 10

# Automatically delete temp files that were not cleaned up by the normal request lifecycle
play.temporaryFile.reaper {
  enabled      = true
  olderThan    = "30 minutes"
  initialDelay = "5 minutes"
  interval     = "5 minutes"
}

microservice {
  services {

    self {
      host = localhost
      port = 1200
        }
    auth {
      host = localhost
      port = 8500
    }
    internal-auth {
      host = localhost
      port = 8470
    }
    etmp {
      host = localhost
      port = 1204
    }
    ppns {
      host = localhost
      port = 6701
    }
    nps {
      host = localhost
      port = 1204
    }
    disa-returns-submission {
      host = localhost
      port = 12103
    }
  }
}

internal-auth.token = "valid-internal-auth-token-disa-returns"

# Enables local-only InternalAuthTokenInitialiser so it can set up
# disa-returns-submission READ and WRITE permissions for the internal-auth.token.
create-internal-auth-token-on-start = true
